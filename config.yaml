paths:
  data_dir: "data/raw"
  chroma_dir: "data/chroma_db"

ollama:
  base_url: "http://localhost:11434"
  llm_model: "llama3"
  embed_model: "nomic-embed-text"
  request_timeout: 240.0

ingestion:
  chunk_size: 384           # Sweet spot for lecture prose — not too broad, not too narrow
  chunk_overlap: 64

  kg_max_triplets_per_chunk: 10

neo4j:
  database: null
